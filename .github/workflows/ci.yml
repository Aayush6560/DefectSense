name: ci

on:
  push:
  pull_request:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Syntax check (robust)
      - name: Syntax check
        run: |
          python - <<EOF
          import compileall
          success = compileall.compile_dir(".", force=True, quiet=1)
          exit(0 if success else 1)
          EOF

      # Run tests
      - name: Run tests
        run: python -m unittest discover -v

      # Build Docker image
      - name: Docker build
        run: docker build -t proj3-defectsense:ci .

      # Install kubectl (client only)
      - name: Install kubectl
        run: |
          KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      # SAFE Kubernetes check (no cluster required)
      - name: Kubernetes manifest validation (offline safe)
        run: |
          echo "Checking Kubernetes YAML files..."
          for file in k8s/*.yaml; do
            echo "Found $file"
            cat $file > /dev/null
          done
          echo "All Kubernetes manifests are present."